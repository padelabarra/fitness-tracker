name: Garmin Biometrics Sync

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Specific date to sync (YYYY-MM-DD). Leave empty for today.'
        required: false
        default: ''
      backfill:
        description: 'Number of days to backfill. Leave empty for single-date sync.'
        required: false
        default: ''

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: ingestion/requirements.txt

      - name: Install dependencies
        run: pip install -r ingestion/requirements.txt

      - name: Sync Garmin biometrics
        run: |
          if [ -n "${{ github.event.inputs.backfill }}" ]; then
            python3 ingestion/garmin_biometrics_sync.py --backfill ${{ github.event.inputs.backfill }}
          elif [ -n "${{ github.event.inputs.date }}" ]; then
            python3 ingestion/garmin_biometrics_sync.py --date ${{ github.event.inputs.date }}
          else
            python3 ingestion/garmin_biometrics_sync.py
          fi
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          USER1_ID: ${{ secrets.USER1_ID }}
